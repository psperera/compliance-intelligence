<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compliance Intelligence — Global Regulatory Intelligence</title>
<style>
:root{
  --navy:#0e1b2c; --navy2:#13263d; --navy3:#1b3550;
  --ink:#1c2733; --muted:#64748b; --muted2:#94a3b8; --line:#e3e8ef; --line2:#eef2f7;
  --bg:#f5f7fa; --card:#ffffff;
  --blue:#1f5fd6; --blue-d:#1747a6; --blue-bg:#eaf1fd;
  --teal:#0d9488; --teal-bg:#e0f5f2;
  --amber:#c2810a; --amber-bg:#fdf3df;
  --red:#c2362f; --red-bg:#fbe9e8;
  --green:#1f8f4e; --green-bg:#e6f5ec;
  --purple:#6d4bb6; --purple-bg:#efeafb;
  --r:10px; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);
  --shadow-lg:0 8px 28px rgba(16,24,40,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px;border:2px solid var(--bg)}

/* Layout */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#cdd9e8;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px}
.brand .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#2f7df0,#1f5fd6);display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px;box-shadow:0 2px 8px rgba(31,95,214,.5)}
.brand b{color:#fff;font-size:15px;font-weight:700;letter-spacing:.2px;display:block;line-height:1.1}
.brand span{font-size:10.5px;color:#7f93ab;letter-spacing:.4px;text-transform:uppercase}
.navsec{padding:6px 12px}
.navsec .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#62768c;padding:12px 10px 6px;font-weight:600}
.nav a{display:flex;align-items:center;gap:11px;padding:8.5px 12px;border-radius:8px;color:#bccadb;font-weight:500;font-size:13.5px;margin:1px 0;transition:.12s}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(31,95,214,.4)}
.nav a .ic{width:18px;height:18px;flex:none;opacity:.92}
.nav a .badge{margin-left:auto;background:rgba(255,255,255,.16);color:#fff;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:10px}
.nav a.active .badge{background:rgba(255,255,255,.25)}
.sb-foot{margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,.07);font-size:11.5px;color:#7f93ab}
.sb-foot .who{display:flex;align-items:center;gap:9px;color:#cdd9e8}
.sb-foot .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3a9,#176);display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px}

/* Topbar */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:10px 22px}
.search{flex:1;max-width:440px;position:relative}
.search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:9px;background:#f8fafc;font-size:13px}
.search input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-bg)}
.search .si{position:absolute;left:11px;top:9px;color:var(--muted2)}
.tb-select{display:flex;align-items:center;gap:6px;padding:7px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:12.5px;color:var(--ink);font-weight:500}
.tb-select b{color:var(--blue)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.iconbtn{position:relative;width:38px;height:38px;border:1px solid var(--line);border-radius:9px;background:#fff;display:grid;place-items:center;color:var(--muted)}
.iconbtn:hover{background:#f8fafc;color:var(--ink)}
.iconbtn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid #fff}

/* Content */
.content{padding:22px;max-width:1500px;width:100%}
.crumbs{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12.5px;margin-bottom:10px}
.crumbs b{color:var(--ink)}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.pagehead h1{font-size:22px;margin:0 0 3px;letter-spacing:-.3px}
.pagehead p{margin:0;color:var(--muted);font-size:13px}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8.5px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--ink)}
.btn:hover{background:#f8fafc}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:var(--blue-d)}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.ghost{border-color:transparent;background:transparent}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}

/* Cards & grid */
.grid{display:grid;gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card .ch{padding:14px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card .ch h3{margin:0;font-size:14.5px;font-weight:700}
.card .ch .sub{font-size:11.5px;color:var(--muted);font-weight:500}
.card .cb{padding:16px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .t{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.2px}
.kpi .v{font-size:30px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px}
.kpi .d{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.kpi .d.up{color:var(--green)} .kpi .d.dn{color:var(--red)} .kpi .d.flat{color:var(--muted)}
.kpi .spark{position:absolute;right:12px;bottom:10px;opacity:.85}
.ring{--p:0;width:64px;height:64px;border-radius:50%;background:conic-gradient(var(--rc,var(--blue)) calc(var(--p)*1%),var(--line2) 0);display:grid;place-items:center;flex:none}
.ring .inner{width:48px;height:48px;border-radius:50%;background:#fff;display:grid;place-items:center;font-weight:800;font-size:15px}

/* Pills / status */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2.5px 9px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
.pill .pd{width:6px;height:6px;border-radius:50%}
.p-red{background:var(--red-bg);color:var(--red)} .p-red .pd{background:var(--red)}
.p-amber{background:var(--amber-bg);color:var(--amber)} .p-amber .pd{background:var(--amber)}
.p-green{background:var(--green-bg);color:var(--green)} .p-green .pd{background:var(--green)}
.p-teal{background:var(--teal-bg);color:var(--teal)} .p-teal .pd{background:var(--teal)}
.p-blue{background:var(--blue-bg);color:var(--blue)} .p-blue .pd{background:var(--blue)}
.p-purple{background:var(--purple-bg);color:var(--purple)} .p-purple .pd{background:var(--purple)}
.p-grey{background:#eef2f7;color:var(--muted)} .p-grey .pd{background:var(--muted2)}
.tag{display:inline-block;padding:2px 8px;border:1px solid var(--line);border-radius:6px;font-size:11px;color:var(--muted);font-weight:600;background:#f8fafc}

/* Tables */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);background:#fafbfc;position:sticky;top:0}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line2);vertical-align:middle}
.tbl tr:hover td{background:#f8fafc}
.tbl .ttl{font-weight:600;color:var(--ink)}
.tbl .ttl:hover{color:var(--blue);cursor:pointer}
.tbl .sm{font-size:11.5px;color:var(--muted)}
.tablewrap{overflow:auto;max-height:none}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:20px;background:#fff;font-size:12.5px;font-weight:600;color:var(--muted)}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}
.chip:hover:not(.active){background:#f1f5f9;color:var(--ink)}
.fselect{padding:7px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:12.5px;color:var(--ink);font-weight:500}

/* Split / change control */
.split{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:#fff}
.split .pane{min-width:0}
.split .pane:first-child{border-right:1px solid var(--line)}
.pane .ph2{padding:12px 16px;border-bottom:1px solid var(--line2);background:#fafbfc;display:flex;align-items:center;justify-content:space-between}
.pane .ph2 .vlabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.pane .ph2 .vno{font-weight:700;font-size:13.5px}
.legaltext{padding:16px 18px;font-size:13px;line-height:1.75;color:#33415c;max-height:560px;overflow:auto;font-family:'Iowan Old Style',Georgia,'Times New Roman',serif}
.legaltext .cl{margin-bottom:14px}
.legaltext .cn{font-weight:700;color:var(--navy);font-family:'Inter',sans-serif;font-size:11.5px;letter-spacing:.3px}
.ins{background:var(--green-bg);color:#10632f;border-radius:3px;padding:1px 2px;box-shadow:inset 0 -1px 0 #9ad3ad}
.del{background:var(--red-bg);color:#8f231d;text-decoration:line-through;border-radius:3px;padding:1px 2px}
.amd{background:var(--amber-bg);color:#7a5208;border-radius:3px;padding:1px 2px;box-shadow:inset 0 -1px 0 #e3c87a}

/* Misc */
.row{display:flex;gap:16px;flex-wrap:wrap}
.muted{color:var(--muted)}
.divider{height:1px;background:var(--line2);margin:14px 0}
.kv{display:grid;grid-template-columns:150px 1fr;gap:8px 14px;font-size:13px}
.kv .k{color:var(--muted);font-weight:600}
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.barrow .bl{width:130px;font-size:12.5px;font-weight:600;flex:none}
.barrow .bt{flex:1;height:9px;background:var(--line2);border-radius:6px;overflow:hidden}
.barrow .bf{height:100%;border-radius:6px}
.barrow .bv{width:42px;text-align:right;font-size:12px;font-weight:700;flex:none}
.heat{display:grid;gap:6px}
.heatcell{padding:9px 10px;border-radius:7px;color:#fff;font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.timeline{position:relative;padding-left:6px}
.tlitem{display:grid;grid-template-columns:96px 22px 1fr;gap:10px;align-items:start;padding-bottom:18px;position:relative}
.tlitem .tldate{font-size:11.5px;font-weight:700;color:var(--muted);text-align:right;padding-top:2px}
.tlitem .tldot{display:flex;flex-direction:column;align-items:center}
.tlitem .tldot .d{width:13px;height:13px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px currentColor;margin-top:3px}
.tlitem .tldot .ln{flex:1;width:2px;background:var(--line);margin-top:3px;min-height:30px}
.tlitem:last-child .tldot .ln{display:none}
.tlcard{background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px 14px;box-shadow:var(--shadow)}
.tlcard h4{margin:0 0 4px;font-size:13.5px}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;align-items:start}
.kcol{background:#f1f4f8;border-radius:10px;padding:10px;min-height:120px}
.kcol .kh{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink);padding:2px 4px 9px}
.kcol .kh .cnt{background:#fff;color:var(--muted);border-radius:10px;padding:0 7px;font-size:11px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 11px;margin-bottom:9px;box-shadow:var(--shadow);border-left:3px solid var(--blue)}
.kcard h5{margin:0 0 6px;font-size:12.5px;line-height:1.35}
.kcard .meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px}
.kcard .av{width:22px;height:22px;border-radius:50%;background:var(--navy3);color:#fff;display:grid;place-items:center;font-size:9.5px;font-weight:700}

/* Email preview */
.email{max-width:620px;margin:0 auto;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow-lg)}
.email .eh{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px}
.email .eb{padding:22px 24px}
.email .alertbar{background:var(--red-bg);border:1px solid #f1c2bf;color:var(--red);border-radius:8px;padding:10px 13px;font-weight:700;font-size:13px;margin-bottom:16px;display:flex;gap:8px;align-items:center}

/* AI box */
.aibox{background:linear-gradient(135deg,#f4f0fc,#eef3fe);border:1px solid #e0d8f5;border-radius:10px;padding:14px 16px}
.aibox .aih{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--purple);margin-bottom:8px}
.conf{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--amber);background:#fff;border:1px solid #ecd9a8;padding:2px 8px;border-radius:20px}

/* matrix status dots */
.mstat{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12px}
.mstat .d{width:9px;height:9px;border-radius:50%}

.empty{text-align:center;padding:40px;color:var(--muted)}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin:4px 0 10px}

@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{display:none}.split{grid-template-columns:1fr}.split .pane:first-child{border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>

/* ===================== tiny chart helpers (inline SVG) ===================== */
function barChart(data,opt={}){
 const max=Math.max(...data.map(d=>d.v))*1.1;
 return data.map(d=>`<div class="barrow"><div class="bl">${d.l}</div><div class="bt"><div class="bf" style="width:${(d.v/max*100).toFixed(0)}%;background:${d.c||'var(--blue)'}"></div></div><div class="bv">${opt.suffix?d.v+opt.suffix:d.v}</div></div>`).join('');
}
function lineChart(vals,w=560,h=160,color='var(--blue)'){
 const max=Math.max(...vals),min=Math.min(...vals)-2;
 const pts=vals.map((v,i)=>[20+i*((w-30)/(vals.length-1)),h-18-((v-min)/(max-min))*(h-36)]);
 const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 const area=path+` L ${pts[pts.length-1][0].toFixed(1)} ${h-18} L 20 ${h-18} Z`;
 return `<svg width="100%" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".22"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
 ${[0,1,2,3].map(i=>`<line x1="20" x2="${w-10}" y1="${18+i*((h-36)/3)}" y2="${18+i*((h-36)/3)}" stroke="var(--line2)"/>`).join('')}
 <path d="${area}" fill="url(#lg)"/><path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
 ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="#fff" stroke="${color}" stroke-width="2"/>`).join('')}</svg>`;
}
function donut(segs,size=120){
 let off=0,c=2*Math.PI*45;
 const arcs=segs.map(s=>{const len=s.v/100*c;const el=`<circle cx="${size/2}" cy="${size/2}" r="45" fill="none" stroke="${s.c}" stroke-width="14" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${size/2} ${size/2})"/>`;off+=len;return el;}).join('');
 return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}</svg>`;
}

function blRows(){
 let rows=REGS.filter(r=>{
   if(BL.view==='mine'&&r.owner!=='M. Keller'&&r.owner!=='S. Vogel')return false;
   if(BL.view==='high'&&!['Critical','High'].includes(r.risk))return false;
   if(BL.view==='changed'&&!(r.changed>='2026-06-01'))return false;
   if(BL.view==='force'&&!(r.status==='Enacted'))return false;
   if(BL.view==='watch'&&!r.watch)return false;
   if(BL.view==='env'&&!['Air Emissions','Water Discharge','Waste & Circularity','Energy & Carbon'].includes(r.topic))return false;
   if(BL.jur!=='All'&&r.jur!==BL.jur)return false;
   if(BL.topic!=='All'&&r.topic!==BL.topic)return false;
   if(BL.status!=='All'&&r.status!==BL.status)return false;
   if(BL.q&&!r.title.toLowerCase().includes(BL.q.toLowerCase()))return false;
   return true;
 });
 const c=$('#blcount'); if(c)c.textContent=rows.length+' regulations';
 const b=$('#blbody'); if(!b)return;
 b.innerHTML=rows.map(r=>`<tr>
   <td class="ttl" onclick="go('baseline/${r.id}')">${r.title}<div class="sm">${r.id}</div></td>

 ${AUDIT.map(a=>`<tr><td class="sm" style="white-space:nowrap;font-variant-numeric:tabular-nums">${a.ts}</td><td><b>${a.user}</b></td><td>${a.action}</td><td class="sm">${a.obj}</td><td><span class="tag">${a.type}</span></td></tr>`).join('')}
 </tbody></table></div></div>`;
};

/* ===================== route aliases for detail pages ===================== */
const _baseFn=ROUTES.baseline;
ROUTES.baseline=(arg)=>arg?regDetail(arg):_baseFn(arg);

/* toast */
function toast(msg){let t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:100;opacity:0;transition:.2s';document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),250);},2200);}
window.toast=toast;

/* boot */
router();
</script>
